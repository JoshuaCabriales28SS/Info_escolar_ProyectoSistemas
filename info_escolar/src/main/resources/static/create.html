<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/Style.css">
    <title>Información Escolar</title>
</head>
<header>
    <div class="logo">UAM</div>
    <div>
        <h1>Información Escolar</h1>
        <p>Universidad Autónoma Metropolitana — Cuajimalpa</p>
    </div>
</header>

<main>
    <div class="panel">

        <form action="" method="post">
            <h1>Creacion de Datos</h1>

            <fieldset>
                <legend>Datos de Unidad</legend>
                <div class="campo">
                    <label for="nombreUnidad">Nombre:</label>
                    <input type="text" name="" id="nombreUnidad">
                </div>
            </fieldset>

            <fieldset>
                <legend>Datos de Division</legend>
                <div class="campo">
                    <label for="nombreDivision">Nombre:</label>
                    <input type="text" name="" id="nombreDivision">
                </div>
                <div class="campo">
                    <label for="unidad">Unidad:</label>
                    <select name="" id="unidad">
                        <option value="">Cuajimalpa</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Datos de Carrera</legend>
                <div class="campo">
                    <label for="nombreCarrera">Nombre:</label>
                    <input type="text" name="" id="nombreCarrera">
                </div>
                <div class="campo">
                    <label for="division">Division:</label>
                    <select name="" id="division">
                        <option value="">DCCD</option>
                    </select>
                </div>
            </fieldset>
        </form>

    </div>
</main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./js/main.js"></script>

</body>
</html>
