<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/Style.css">
    <link rel="stylesheet" href="./css/inicio.css">
    <link rel="stylesheet" href="./css/crear.css">
    <title>Información Escolar</title>
</head>
<body>

<header>
    <div class="logo">UAM</div>
    <div>
        <h1>Información Escolar</h1>
        <p>Universidad Autónoma Metropolitana — Cuajimalpa</p>
    </div>
</header>

<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Editar Información Escolar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="crear.html">Crear</a></li>
                <li class="nav-item"><a class="nav-link active" href="editar.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="ver.html">Ver</a></li>
                <li class="nav-item"><a class="nav-link" href="eliminar.html">Eliminar</a></li>
                <li class="nav-item"><a class="nav-link" href="universidad.html">Universidades</a></li>
                <li class="nav-item"><a class="nav-link" href="carrera.html">Carreras</a></li>
                <li class="nav-item"><a class="nav-link" href="empresa.html">Empresas</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div class="panel">
        <div class="panel-header">
            <h2>Editar entrada</h2>
            <select id="entitySelect" onchange="cambiarFormulario()">
                <option value="alumnos">Alumno</option>
                <option value="materias">Materia</option>
                <option value="carreras">Carrera</option>
                <option value="divisiones">División</option>
                <option value="grupos">Grupo</option>
                <option value="profesores">Profesor</option>
                <option value="tutores">Tutor</option>
                <option value="unidades">Unidad</option>
            </select>
        </div>

        <div class="form-area" id="formArea">
            <!-- CONTENIDO DESDE JS -->
        </div>
        <div id="msg">
            <!-- MENSAJE DE ALERTA -->
        </div>

        <div class="footer-bar">
            <button class="btn-cancel" onclick="limpiar()">Limpiar</button>
            <button class="btn-crear" onclick="editar()">Editar</button>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./js/editar.js"></script>

</body>
</html>
