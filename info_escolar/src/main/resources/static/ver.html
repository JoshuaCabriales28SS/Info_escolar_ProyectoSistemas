<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/Style.css">
    <link rel="stylesheet" href="./css/inicio.css">
    <title>Información Escolar</title>
</head>
<header>
    <div class="logo">UAM</div>
    <div>
        <h1>Información Escolar</h1>
        <p>Universidad Autónoma Metropolitana — Cuajimalpa</p>
    </div>
</header>
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="index.html">Ver Informacion Escolar</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="crear.html">Crear</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="editar.html">Editar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="ver.html">Ver</a>
                </li>
                <li class="nav-item">
                    <a sec:authorize="hasRole('ADMIN')" class="nav-link" href="eliminar.html">Eliminar</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div class="panel">

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Buscar por nombre, ID…">
            <select id="entitySelect">
                <option value="alumnos">Alumnos</option>
                <option value="materias">Materias</option>
                <option value="carreras">Carreras</option>
                <option value="divisiones">Divisiones</option>
                <option value="grupos">Grupos</option>
                <option value="profesores">Profesores</option>
                <option value="tutores">Tutores</option>
                <option value="unidades">Unidades</option>
            </select>
        </div>

        <div class="display" id="displayArea">
            <div class="msg">
                <strong>Sin datos aún</strong>
                Elige una categoría y presiona Mostrar.
            </div>
        </div>

        <div class="footer-bar">
            <button onclick="buscar()">Mostrar</button>
        </div>

    </div>
</main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./js/main.js"></script>

</body>
</html>
