<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css" as="style">
    <title>Login</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="index.html">Sistema Escolar</a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="form-contenido">
        <h1 class="form-titulo">Inicia Sesion</h1>
        <form class="form" action="/login" method="post">
            <div class="campo">
                <label for="username">Usuario:</label>
                <input class="email" type="text" name="username" id="username" placeholder="Correo">
            </div>
            <div class="campo">
                <label for="password">Contraseña:</label>
                <input class="pwd" type="password" name="password" id="password" placeholder="Contraseña">
            </div>
            <button class="btn btn-login" type="submit">Iniciar Sesion</button>
        </form>
    </div>
</body>
</html>
